<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KR Client</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    :root {
      --bg: #0d0d12;
      --surface: #16161f;
      --border: #2a2a3a;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --danger: #ff4d6d;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --chat-me: #1e1e38;
      --chat-them: #1a2535;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      user-select: none;
    }

    /* ── DRAG HEADER ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      cursor: move;
    }
    #header .left  { display: flex; align-items: center; gap: 7px; }
    #header .logo  { font-size: 14px; font-weight: 600; color: var(--accent); letter-spacing: .5px; }
    #status-dot    { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); transition: background .3s; flex-shrink: 0; }
    #status-dot.ok { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
    #room-label    { font-size: 9px; color: var(--muted); font-family: monospace; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    #btn-close {
      -webkit-app-region: no-drag;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 15px; line-height: 1;
      transition: color .2s;
    }
    #btn-close:hover { color: var(--danger); }

    /* ── TABS ── */
    #tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1; padding: 6px 0; text-align: center;
      font-size: 11px; font-weight: 500; cursor: pointer;
      color: var(--muted); transition: color .2s, border-bottom .2s;
      border-bottom: 2px solid transparent;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── PANELS ── */
    #panels { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .panel { display: none; flex-direction: column; height: 100%; }
    .panel.active { display: flex; }

    /* ── CHAT ── */
    #chat-messages {
      flex: 1; overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 6px;
      scroll-behavior: smooth;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      max-width: 85%; padding: 6px 10px; border-radius: 8px;
      font-size: 12px; line-height: 1.4; word-break: break-word;
    }
    .msg.me   { align-self: flex-end; background: var(--chat-me); border: 1px solid var(--accent); color: #c8c8ff; }
    .msg.them { align-self: flex-start; background: var(--chat-them); border: 1px solid var(--border); color: var(--text); }
    .msg .sender { font-size: 9px; font-weight: 600; margin-bottom: 3px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

    .msg-system {
      text-align: center; font-size: 10px; color: var(--muted);
      font-style: italic; padding: 2px 0;
    }

    #chat-input-area {
      display: flex; gap: 6px; padding: 7px 8px;
      border-top: 1px solid var(--border); background: var(--surface);
    }
    #chat-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 8px;
      font-size: 12px; color: var(--text); outline: none;
      font-family: inherit; resize: none; height: 34px;
      transition: border-color .2s;
    }
    #chat-input:focus { border-color: var(--accent); }
    #chat-input::placeholder { color: var(--muted); }
    #btn-send {
      background: var(--accent); border: none; border-radius: 6px;
      width: 34px; height: 34px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: opacity .2s, transform .1s;
      flex-shrink: 0;
    }
    #btn-send:hover { opacity: .85; }
    #btn-send:active { transform: scale(.93); }
    #btn-send svg { width: 16px; height: 16px; fill: #fff; }

    /* ── ANSWERS ── */
    #answers-list {
      flex: 1; overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 6px;
    }
    #answers-list::-webkit-scrollbar { width: 4px; }
    #answers-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .answer-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 8px 10px;
      font-size: 12px; cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .answer-card:hover { border-color: var(--accent2); background: #161d1a; }
    .answer-card .q { color: var(--muted); font-size: 10px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
    .answer-card .a { color: var(--text); line-height: 1.4; }
    .answer-card .copy-hint {
      position: absolute; right: 8px; top: 8px;
      font-size: 9px; color: var(--accent2); opacity: 0; transition: opacity .2s;
    }
    .answer-card:hover .copy-hint { opacity: 1; }

    .answers-empty { text-align: center; color: var(--muted); font-size: 12px; margin-top: 24px; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--accent2); color: #000; padding: 5px 14px;
      border-radius: 20px; font-size: 11px; font-weight: 600;
      opacity: 0; transition: opacity .25s, transform .25s;
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── LAYOUT ── */
    body {
      display: flex; flex-direction: column; height: 100vh;
    }
    #panels { height: calc(100vh - 56px); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div id="header">
    <div class="left">
      <span class="logo">⚡ KR</span>
      <span id="status-dot"></span>
      <span id="room-label">Offline</span>
    </div>
    <button id="btn-close" title="Đóng">✕</button>
  </div>

  <!-- TABS -->
  <div id="tabs">
    <div class="tab active" data-tab="chat">💬 Chat</div>
    <div class="tab"        data-tab="answers">📋 Đáp án</div>
  </div>

  <!-- PANELS -->
  <div id="panels">

    <!-- CHAT PANEL -->
    <div class="panel active" id="panel-chat">
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <textarea id="chat-input" placeholder="Nhập tin nhắn…" rows="1"></textarea>
        <button id="btn-send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

    <!-- ANSWERS PANEL -->
    <div class="panel" id="panel-answers">
      <div id="answers-list">
        <p class="answers-empty">Chưa có đáp án nào.<br>Support sẽ gửi cho bạn.</p>
      </div>
    </div>

  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
